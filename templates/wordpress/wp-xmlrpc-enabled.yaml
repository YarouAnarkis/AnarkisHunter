id: wp-xmlrpc-enabled
name: WordPress XML-RPC Enabled (Brute Force Vector)
severity: HIGH
owasp: A07
tags: [wordpress, xmlrpc, bruteforce]
description: WordPress XML-RPC interface aktif, memungkinkan brute force password tanpa rate limiting.

request:
  method: POST
  path: /xmlrpc.php
  headers:
    Content-Type: text/xml
  body: |
    <?xml version="1.0" encoding="UTF-8"?>
    <methodCall><methodName>system.listMethods</methodName><params></params></methodCall>

matchers:
  - type: word
    words:
      - "methodResponse"
      - "system.listMethods"
    condition: or
  - type: status
    status: [200]
