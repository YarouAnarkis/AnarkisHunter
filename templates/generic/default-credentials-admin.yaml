id: default-credentials-admin
name: Default Admin Credentials (admin/admin)
severity: CRITICAL
owasp: A07
tags: [auth, default-credentials, bruteforce]
description: Aplikasi menggunakan kredensial default admin/admin atau admin/password.

request:
  method: POST
  path: /wp-login.php
  headers:
    Content-Type: application/x-www-form-urlencoded
  body: "log=admin&pwd=admin&wp-submit=Log+In&redirect_to=%2Fwp-admin%2F&testcookie=1"

matchers:
  - type: word
    words:
      - "Dashboard"
      - "wp-admin"
      - "Howdy"
    condition: or
  - type: status
    status: [200, 302]
